<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Elisa Vargas | Product Design Leader</title>
    <script>
      // GitHub Pages SPA redirect trick
      var l = window.location;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?/' + l.pathname.slice(1).split('/').join('/').replace(/&/g, '~and~') + (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash);
    </script>
  </head>
</html>
